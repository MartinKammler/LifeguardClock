<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <style>
    :root { --bg:#09090d; --bg2:#13131a; --bg3:#1e1e2a; --border:#2a2a3a;
            --text:#e8e8f0; --text-2:#a0a0b8; --text-3:#606078;
            --ok:#22c55e; --fail:#ef4444; --skip:#f59e0b; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text);
           padding: 24px; font-size: 13px; line-height: 1.6; }
    h1   { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .sub { color: var(--text-3); font-size: 12px; margin-bottom: 24px; }
    .suite { margin-bottom: 20px; }
    .suite-title { font-size: 14px; font-weight: 700; color: var(--text-2);
                   padding: 8px 12px; background: var(--bg2);
                   border-left: 3px solid var(--border); margin-bottom: 4px;
                   border-radius: 0 6px 6px 0; }
    .suite-title.all-ok   { border-left-color: var(--ok); }
    .suite-title.has-fail { border-left-color: var(--fail); }
    .test { padding: 4px 12px 4px 20px; border-bottom: 1px solid var(--bg3); }
    .test.ok   { color: var(--ok); }
    .test.fail { color: var(--fail); font-weight: 600; }
    .detail    { color: var(--text-3); font-size: 11px; padding-left: 20px; }
    .summary { margin-top: 24px; padding: 16px 20px;
               background: var(--bg2); border-radius: 10px; font-size: 14px; }
    .summary .big { font-size: 26px; font-weight: 800; }
    .ok-text   { color: var(--ok); }
    .fail-text { color: var(--fail); }
  </style>
</head>
<body>
  <h1>LifeguardClock Dashboard – Unit Tests</h1>
  <div class="sub">Funktionen aus dashboard.html · inline Demo-Daten</div>
  <div id="output"></div>
  <div class="summary" id="summary"></div>

<script>
// ─── Test-Harness ─────────────────────────────────────────────────────────────
let _suites = [], _cur = null, _total = 0, _passed = 0;

function suite(name) {
  _cur = { name, tests: [] };
  _suites.push(_cur);
}
function eq(desc, expected, actual) {
  _total++;
  const ok = JSON.stringify(expected) === JSON.stringify(actual);
  if (ok) _passed++;
  _cur.tests.push({ desc, ok,
    detail: ok ? null : `erwartet: ${JSON.stringify(expected)}, bekommen: ${JSON.stringify(actual)}` });
}
function ok(desc, bool) { eq(desc, true, bool); }

function render() {
  const out = document.getElementById('output');
  let html = '';
  for (const s of _suites) {
    const failed = s.tests.filter(t => !t.ok).length;
    const cls = failed === 0 ? 'all-ok' : 'has-fail';
    html += `<div class="suite">
      <div class="suite-title ${cls}">${s.name} — ${s.tests.filter(t=>t.ok).length}/${s.tests.length} ✓</div>`;
    for (const t of s.tests) {
      html += `<div class="test ${t.ok ? 'ok' : 'fail'}">${t.ok ? '✓' : '✗'} ${t.desc}</div>`;
      if (t.detail) html += `<div class="detail">↳ ${t.detail}</div>`;
    }
    html += `</div>`;
  }
  out.innerHTML = html;
  const allOk = _passed === _total;
  document.getElementById('summary').innerHTML =
    `<span class="big ${allOk ? 'ok-text' : 'fail-text'}">${_passed}/${_total}</span>
     &nbsp; Tests bestanden &nbsp;·&nbsp; ${_total - _passed} fehlgeschlagen`;
}

// ─── Funktionen aus dashboard.html (1:1 kopiert) ──────────────────────────────
const TYPES = ['anwesenheit', 'wachstunde_ehrenamtlich', 'sanitätsstunde'];

function fmtH(ms) {
  if (!ms) return '—';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `${h}:${String(m).padStart(2,'0')}`;
}
function fmtMs(ms) {
  if (!ms) return '—';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h} h ${String(m).padStart(2,'0')} min` : `${m} min`;
}
function fmtDateShort(iso) {
  return new Date(iso + 'T12:00:00').toLocaleDateString('de-DE',
    { day:'2-digit', month:'2-digit', year:'numeric' });
}
function isoWeekKey(iso) {
  const d = new Date(iso + 'T12:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const kw = 1 + Math.round(((d - jan4) / 86400000 - 3 + ((jan4.getDay()||7))) / 7);
  return `${d.getFullYear()}-W${String(kw).padStart(2,'0')}`;
}
function fmtWeek(wk) {
  const [y, w] = wk.split('-W');
  return `KW\u00a0${w}\u00a0/${y}`;
}
function buildDB(entries) {
  const by = {};
  const personSet = new Set();
  for (const { day, log } of entries) {
    for (const e of log) {
      if (e.aktion !== 'stop' || !e.dauer_ms) continue;
      const p = e.nutzer, t = e.typ;
      personSet.add(p);
      if (!by[day]) by[day] = {};
      if (!by[day][p]) by[day][p] = {};
      by[day][p][t] = (by[day][p][t] || 0) + e.dauer_ms;
    }
  }
  const days = Object.keys(by).sort();
  const persons = [...personSet].sort();
  const weekMap = {};
  for (const d of days) {
    const wk = isoWeekKey(d);
    if (!weekMap[wk]) weekMap[wk] = [];
    weekMap[wk].push(d);
  }
  const weeks = Object.keys(weekMap).sort();
  return { by, days, persons, weekMap, weeks };
}

// ─── Hilfsfunktionen für Tests ────────────────────────────────────────────────
function personTotal(db, person, typ) {
  let sum = 0;
  for (const dayData of Object.values(db.by))
    sum += (dayData[person]?.[typ] || 0);
  return sum;
}
function weekTotal(db, wk, typ) {
  let sum = 0;
  for (const d of (db.weekMap[wk] || []))
    for (const pd of Object.values(db.by[d] || {}))
      sum += pd[typ] || 0;
  return sum;
}
function grandTotal(db, typ) {
  let sum = 0;
  for (const dv of Object.values(db.by))
    for (const pd of Object.values(dv))
      sum += pd[typ] || 0;
  return sum;
}
function topPerson(db, typ) {
  const pt = {};
  for (const dv of Object.values(db.by))
    for (const [p, pd] of Object.entries(dv))
      pt[p] = (pt[p]||0) + (pd[typ]||0);
  return Object.entries(pt).sort((a,b)=>b[1]-a[1])[0][0];
}
