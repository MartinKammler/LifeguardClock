  <meta charset="UTF-8">

  <style>
    body { font-family: monospace; background: #0d0d12; color: #ccc; margin: 0; padding: 20px; }
    h1   { color: #fff; font-size: 1.1rem; margin-bottom: 16px; }
    .suite { margin-bottom: 20px; }
    .suite-title { color: #7eb8f7; font-size: .9rem; margin-bottom: 6px; font-weight: bold; }
    .pass { color: #4caf7d; }
    .fail { color: #f76e6e; }
    .result { font-size: .82rem; margin: 2px 0 2px 12px; }
    #summary { margin-top: 24px; font-size: 1rem; font-weight: bold; padding: 10px; border-radius: 6px; }
    .all-pass { background: #1a3a28; color: #4caf7d; }
    .has-fail  { background: #3a1a1a; color: #f76e6e; }
  </style>
</head>

<h1>LifeguardClock Dashboard – Unit Tests</h1>
<div id="output"></div>
<div id="summary"></div>

<script>
// ─── Test-Harness ─────────────────────────────────────────────────────────────
let _suites = [], _cur = null, _total = 0, _passed = 0;

function suite(name) {
  _cur = { name, tests: [] };
  _suites.push(_cur);
}
function eq(desc, expected, actual) {
  _total++;
  const ok = JSON.stringify(expected) === JSON.stringify(actual);
  if (ok) _passed++;
  _cur.tests.push({ desc, ok,
    detail: ok ? null : `erwartet: ${JSON.stringify(expected)}, bekommen: ${JSON.stringify(actual)}` });
}
function ok(desc, bool) { eq(desc, true, bool); }

function render() {
  const out = document.getElementById('output');
  for (const s of _suites) {
    const div = document.createElement('div');
    div.className = 'suite';
    div.innerHTML = `<div class="suite-title">${s.name}</div>`;
    for (const t of s.tests) {
      const d = document.createElement('div');
      d.className = `result ${t.ok ? 'pass' : 'fail'}`;
      d.textContent = `${t.ok ? '✓' : '✗'} ${t.desc}${t.detail ? ' — ' + t.detail : ''}`;
      div.appendChild(d);
    }
    out.appendChild(div);
  }
  const failed = _total - _passed;
  const sum = document.getElementById('summary');
  sum.className = failed === 0 ? 'all-pass' : 'has-fail';
  sum.textContent = failed === 0
    ? `✓ Alle ${_passed} Tests bestanden`
    : `✗ ${failed} von ${_total} Tests fehlgeschlagen`;
}

// ─── Funktionen aus dashboard.html (1:1 kopiert) ──────────────────────────────
const TYPES = ['anwesenheit', 'wachstunde_ehrenamtlich', 'sanitätsstunde'];

function fmtH(ms) {
  if (!ms) return '—';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `${h}:${String(m).padStart(2,'0')}`;
}
function fmtMs(ms) {
  if (!ms) return '—';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h} h ${String(m).padStart(2,'0')} min` : `${m} min`;
}
function fmtDateShort(iso) {
  return new Date(iso + 'T12:00:00').toLocaleDateString('de-DE',
    { day:'2-digit', month:'2-digit', year:'numeric' });
}
function isoWeekKey(iso) {
  const d = new Date(iso + 'T12:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const kw = 1 + Math.round(((d - jan4) / 86400000 - 3 + ((jan4.getDay()||7))) / 7);
  return `${d.getFullYear()}-W${String(kw).padStart(2,'0')}`;
}
function fmtWeek(wk) {
  const [y, w] = wk.split('-W');
  return `KW\u00a0${w}\u00a0/${y}`;
}
function buildDB(entries) {
  const by = {};
  const personSet = new Set();
  const typeTotals = {};

  const allByDay = {};
  for (const { day, log } of entries) {
    if (!allByDay[day]) allByDay[day] = [];
    allByDay[day].push(...log);
  }

  for (const [day, log] of Object.entries(allByDay)) {
    const groups = {};
    for (const e of log) {
      if (!e.nutzer || !e.typ) continue;
      const k = `${e.nutzer}\0${e.typ}`;
      if (!groups[k]) groups[k] = [];
      groups[k].push(e);
    }
    for (const grpEntries of Object.values(groups)) {
      const sorted = grpEntries.sort((a, b) => new Date(a.zeitstempel) - new Date(b.zeitstempel));
      const p = sorted[0].nutzer;
      const t = sorted[0].typ;
      let openStart = null;
      for (const e of sorted) {
        if (e.aktion === 'start') {
          openStart = e;
        } else if (e.aktion === 'stop') {
          if (!openStart) continue; // verwaister Stop → überspringen
          let durMs = (e.dauer_ms > 0) ? e.dauer_ms : null;
          if (!durMs) durMs = new Date(e.zeitstempel) - new Date(openStart.zeitstempel);
          if (durMs > 0) {
            personSet.add(p);
            if (!by[day]) by[day] = {};
            if (!by[day][p]) by[day][p] = {};
            by[day][p][t] = (by[day][p][t] || 0) + durMs;
            typeTotals[t] = (typeTotals[t] || 0) + durMs;
          }
          openStart = null;
        }
      }
    }
  }

  const days = Object.keys(by).sort();
  const persons = [...personSet].sort();
  const weekMap = {};
  for (const d of days) {
    const wk = isoWeekKey(d);
    if (!weekMap[wk]) weekMap[wk] = [];
    weekMap[wk].push(d);
  }
  const weeks = Object.keys(weekMap).sort();
  return { by, days, persons, weekMap, weeks, typeTotals };
}

const H1=3600000, H2=7200000, H3=10800000, H4=14400000, H5=18000000, H6=21600000;

function makeLog(entries) {
  // entries: [{nutzer, typ, dauer_ms, ts_stop}]
  // erzeugt start+stop-Paare mit echten Zeitstempeln (start = ts_stop − dauer_ms)
  return entries.flatMap(({ nutzer, typ, dauer_ms, ts_stop }) => {
    const stop  = ts_stop || '2026-01-10T14:00:00.000Z';
    const start = new Date(new Date(stop).getTime() - dauer_ms).toISOString();
    return [
      { aktion:'start', nutzer, typ, zeitstempel: start, id: Math.random() },
      { aktion:'stop',  nutzer, typ, zeitstempel: stop,  dauer_ms, id: Math.random() },
    ];
  });
}

// ─── Hilfsfunktionen für Tests ────────────────────────────────────────────────
function personTotal(db, person, typ) {
  let sum = 0;
  for (const dayData of Object.values(db.by))
    sum += (dayData[person]?.[typ] || 0);
  return sum;
}
function weekTotal(db, wk, typ) {
  let sum = 0;
  for (const d of (db.weekMap[wk] || []))
    for (const pd of Object.values(db.by[d] || {}))
      sum += pd[typ] || 0;
  return sum;
}
function grandTotal(db, typ) {
  let sum = 0;
  for (const dv of Object.values(db.by))
    for (const pd of Object.values(dv))
      sum += pd[typ] || 0;
  return sum;
}
function topPerson(db, typ) {
  const pt = {};
  for (const dv of Object.values(db.by))
    for (const [p, pd] of Object.entries(dv))
      pt[p] = (pt[p]||0) + (pd[typ]||0);
  return Object.entries(pt).sort((a,b)=>b[1]-a[1])[0][0];
}

]);

// Szenario: korrekte Session am 09.05., aber das Gerät erzeugt einen Auto-Stop

const autoStopBugDB = buildDB([

    day: '2026-05-09',

      { aktion:'stop',  nutzer:'Uwe', typ:'anwesenheit', zeitstempel:'2026-05-09T16:15:00.000Z', dauer_ms:6900000, id:2 },
    ],
  },
  {
    day: '2026-05-10',
    log: [
      // Auto-Stop mit großem dauer_ms, aber kein Start auf diesem Tag
      { aktion:'stop', nutzer:'Uwe', typ:'anwesenheit', zeitstempel:'2026-05-10T02:00:00.000Z', dauer_ms:41959278, auto:true, id:3 },
    ],
  },
]);
eq('09.05.: korrekte Session ~1h 55min', 6900000, autoStopBugDB.by['2026-05-09']?.['Uwe']?.['anwesenheit']);
eq('10.05.: existiert nicht (verwaister Auto-Stop ignoriert)', undefined, autoStopBugDB.by['2026-05-10']);
