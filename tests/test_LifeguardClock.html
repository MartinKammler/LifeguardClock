<h1>LifeguardClock – Unit Tests</h1>
<div id="output"></div>
<div id="summary"></div>

<script>
/* ── Mini Test-Runner (async-fähig) ────────────────────────── */
const results = [];
let currentSuite = '';

function suite(name) { currentSuite = name; }

// test() gibt ein Promise zurück – alle Aufrufe werden mit await gesammelt
async function test(name, fn) {
  try {
    await fn();
    results.push({ suite: currentSuite, name, ok: true });
  } catch (e) {
    results.push({ suite: currentSuite, name, ok: false, err: e.message });
  }
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || 'Assertion failed');
}
function assertEqual(a, b, msg) {
  if (a !== b) throw new Error((msg || '') + ` — erwartet: ${JSON.stringify(b)}, bekommen: ${JSON.stringify(a)}`);
}
function assertNull(v, msg) {
  if (v !== null) throw new Error((msg || '') + ` — erwartet null, bekommen: ${JSON.stringify(v)}`);
}
function assertNotNull(v, msg) {
  if (v === null) throw new Error((msg || '') + ' — erwartet nicht null');
}

/* ── Mock localStorage ─────────────────────────────────────── */
const _store = {};
const localStorage = {
  getItem:    k       => (_store[k] ?? null),
  setItem:    (k, v)  => { _store[k] = String(v); },
  removeItem: k       => { delete _store[k]; },
  clear:      ()      => { Object.keys(_store).forEach(k => delete _store[k]); },
};
function resetStore() { localStorage.clear(); }

/* ── Stub für DOM/Toast (nicht getestet) ───────────────────── */

function syncDashboard() {}
function showToast() {}
function syncToCloud() {}

/* ── CONFIG-Mock (für getUsers-Tests überschreibbar) ────────── */

  removedUsers: [],
  types: [

    { key: 'wachdienst',  label: 'Wachdienst',    logType: 'wachdienst',    color: 'amber',

function resetConfig() {
  CONFIG = {

    defaultUsers: [{ id: 'default_a', name: 'Default A', pin: '111111', mustChangePIN: true }],
    removedUsers: [],
    types: [
      { key: 'anwesenheit', label: 'Anwesenheit',   logType: 'anwesenheit',   color: 'blue',  pinned: true },
      { key: 'wachdienst',  label: 'Wachdienst',    logType: 'wachdienst',    color: 'amber',
        requiresZeitfenster: true, maxDurationMs: 7200000, cooldownMs: 1800000,
        autoStartKeys: ['anwesenheit'], mutexKeys: ['sanitaet'], permissionKey: 'wachdienst' },
      { key: 'sanitaet',    label: 'Sanitätsdienst', logType: 'sanitaetsdienst', color: 'red',

}
// TYPES aus CONFIG ableiten (wie in LifeguardClock.html) – deaktivierte Typen herausfiltern
let TYPES = (CONFIG.types || []).filter(t => !t.disabled).map(t => ({ ...t }));
function rebuildTypes() { TYPES = (CONFIG.types || []).filter(t => !t.disabled).map(t => ({ ...t })); }

/* ── Funktionen aus LifeguardClock.html (1:1 kopiert) ───────────────── */

function pad(n) { return String(n).padStart(2, '0'); }

function markLocalChange() {
  localStorage.setItem('stempeluhr_cloud_last_change', new Date().toISOString());
}
function getLog() {
  try { return JSON.parse(localStorage.getItem('stempeluhr_log') || '[]'); }
  catch { return []; }
}
function saveLog(log) {
  localStorage.setItem('stempeluhr_log', JSON.stringify(log));
  markLocalChange();
}
function getAllStates() {
  try { return JSON.parse(localStorage.getItem('stempeluhr_state') || '{}'); }
  catch { return {}; }
}
function saveAllStates(s) {
  localStorage.setItem('stempeluhr_state', JSON.stringify(s));
  markLocalChange();
}
function todayISO(d = new Date()) {
  const boundary = CONFIG.dayBoundaryHour ?? 4;
  const dt = new Date(d);
  if (dt.getHours() < boundary) dt.setDate(dt.getDate() - 1);
  return dt.toISOString().slice(0, 10);
}
function detectPlatformPrefix() {
  const ua = (navigator.userAgent || '').toLowerCase();
  const pl = (navigator.platform  || '').toLowerCase();
  if (/ipad/.test(ua))                             return 'ipad';
  if (/iphone/.test(ua))                           return 'iphone';
  if (/android/.test(ua) && /mobile/.test(ua))     return 'android';
  if (/android/.test(ua))                          return 'android-tab';
  if (/win/.test(pl))                              return 'win';
  if (/mac/.test(pl) && !/iphone|ipad/.test(ua))   return 'mac';
  if (/linux/.test(pl))                            return 'linux';
  return 'geraet';
}
function getDeviceId() {
  if (CONFIG.deviceId) return CONFIG.deviceId.trim();
  const KEY = 'stempeluhr_device_id';
  let id = localStorage.getItem(KEY);
  if (!id) {
    const suffix = crypto.randomUUID().replace(/-/g, '').slice(0, 4);
    id = `${detectPlatformPrefix()}-${suffix}`;
    localStorage.setItem(KEY, id);
  }
  return id;
}
function currentHHMM() {
  const n = new Date();
  return `${pad(n.getHours())}:${pad(n.getMinutes())}`;
}
function getZeitfenster() {
  try {
    const s = JSON.parse(localStorage.getItem('stempeluhr_zeitfenster') || 'null');
    if (s && s.date === todayISO()) return s;
  } catch {}
  return { date: todayISO(), start: '07:00', end: '21:00' };
}
function saveZeitfenster(start, end) {
  localStorage.setItem('stempeluhr_zeitfenster', JSON.stringify({ date: todayISO(), start, end }));
}
function isWithinZeitfenster() {
  const { start, end } = getZeitfenster();
  const now = currentHHMM();
  return now >= start && now < end;
}
function calcDurationMs(userName, logType, atTs) {
  const atTime = atTs ? new Date(atTs).getTime() : Date.now();
  const log = getLog();
  for (let i = log.length - 1; i >= 0; i--) {
    const e = log[i];
    if (e.nutzer === userName && e.typ === logType && e.aktion === 'start')
      return Math.max(0, atTime - new Date(e.zeitstempel).getTime());
  }
  return 0;
}
function getTypeStartMs(userName, logType) {
  const log = getLog();
  for (let i = log.length - 1; i >= 0; i--) {
    const e = log[i];
    if (e.nutzer === userName && e.typ === logType) {
      return e.aktion === 'start' ? new Date(e.zeitstempel).getTime() : null;
    }
  }
  return null;
}
function typeRemainingMs(userName, type) {
  if (!type.maxDurationMs) return null;
  const startMs = getTypeStartMs(userName, type.logType);
  if (startMs === null) return null;
  return Math.max(0, type.maxDurationMs - (Date.now() - startMs));
}

/* ── Per-Typ-Zeitfenster (neu) ──────────────────────────────── */
const _ZF_DAY_KEYS = ['so', 'mo', 'di', 'mi', 'do', 'fr', 'sa'];

function getZFDefaultForType(type) {
  const d = new Date();
  if (d.getHours() < (CONFIG.dayBoundaryHour ?? 4)) d.setDate(d.getDate() - 1);
  const dayKey = _ZF_DAY_KEYS[d.getDay()];
  if (type?.zeitfenster) return type.zeitfenster[dayKey] ?? null;
  return (CONFIG.zeitfensterDefaults?.[dayKey]) ?? { start: '07:00', end: '21:00' };
}
function getZeitfensterForType(type) {
  try {
    const s = JSON.parse(localStorage.getItem('stempeluhr_zeitfenster') || 'null');
    if (s && s.date === todayISO() && s.types?.[type.key]) return s.types[type.key];
  } catch {}
  return getZFDefaultForType(type);
}
function saveZeitfensterForType(typeKey, start, end) {
  let s = {};
  try { s = JSON.parse(localStorage.getItem('stempeluhr_zeitfenster') || '{}'); } catch {}
  if (s.date !== todayISO()) s = { date: todayISO(), types: {} };
  if (!s.types) s.types = {};
  s.types[typeKey] = { start, end };
  localStorage.setItem('stempeluhr_zeitfenster', JSON.stringify(s));
}
function saveZeitfensterAllTypes(start, end) {
  TIME_KEYS.forEach(k => saveZeitfensterForType(k, start, end));
}
function isWithinZeitfensterForType(type) {
  const zf = getZeitfensterForType(type);
  if (!zf) return false;
  const now = currentHHMM();
  return now >= zf.start && now < zf.end;
}

const TIME_KEYS = TYPES.filter(t => t.requiresZeitfenster).map(t => t.key);

let USERS = [{ id: 'test_user', name: 'Test User' }];
function saveUsers(list) {
  localStorage.setItem('stempeluhr_users', JSON.stringify(list));
  USERS.length = 0;
  list.forEach(u => USERS.push(u));
}
function getUsers() {
  const removeIds = new Set(CONFIG.removedUsers || []);
  const defaults  = CONFIG.defaultUsers
    .filter(u => !removeIds.has(u.id))
    .map(u => ({...u}));

  let stored;
  try { stored = JSON.parse(localStorage.getItem('stempeluhr_users') || 'null'); } catch {}
  if (!Array.isArray(stored)) {
    localStorage.setItem('stempeluhr_users', JSON.stringify(defaults));
    return defaults;
  }

  stored = stored.filter(u => !removeIds.has(u.id));
  const storedIds = new Set(stored.map(u => u.id));
  const newUsers  = defaults.filter(u => !storedIds.has(u.id)).map(u => ({...u}));
  const result    = newUsers.length ? [...stored, ...newUsers] : stored;
  localStorage.setItem('stempeluhr_users', JSON.stringify(result));
  return result;
}

// Neue per-typ Version (wie in LifeguardClock.html)
function checkZeitfensterEnd() {
  const allStates = getAllStates();
  const now       = new Date().toISOString();
  let changed     = false;
  USERS.forEach(user => {
    const state = allStates[user.id];
    if (!state) return;
    TIME_KEYS.forEach(key => {
      if (!state[key]) return;
      const type = TYPES.find(t => t.key === key);
      if (isWithinZeitfensterForType(type)) return;   // per-Typ-Prüfung
      const durMs = calcDurationMs(user.name, type.logType, now);
      const log   = getLog();
      log.push({ id: Date.now() + Math.random(), nutzer: user.name, typ: type.logType, aktion: 'stop', zeitstempel: now, auto: true, dauer_ms: durMs });
      saveLog(log);
      state[key] = false;
      changed = true;
      if (currentUser && currentUser.id === user.id) {
        syncDashboard();
        showToast(`Zeitfenster abgelaufen – ${type.label} beendet`);
      }
    });
  });
  if (changed) saveAllStates(allStates);
}

function checkTimeLimits() {
  const allStates = getAllStates();
  const now       = new Date();
  let changed     = false;
  USERS.forEach(user => {
    const state = allStates[user.id];
    if (!state) return;
    TYPES.forEach(type => {
      if (!type.maxDurationMs || !state[type.key]) return;
      const startMs = getTypeStartMs(user.name, type.logType);
      if (startMs === null) return;
      if (now.getTime() - startMs < type.maxDurationMs) return;
      const stopTs = new Date(startMs + type.maxDurationMs).toISOString();
      const log    = getLog();
      log.push({ id: Date.now() + Math.random(), nutzer: user.name, typ: type.logType, aktion: 'stop',
        zeitstempel: stopTs, auto: true, dauer_ms: type.maxDurationMs });
      saveLog(log);
      state[type.key] = false;
      if (type.cooldownMs) {
        if (!state.cooldown) state.cooldown = {};
        state.cooldown[type.key] = new Date(now.getTime() + type.cooldownMs).toISOString();
      }
      allStates[user.id] = state;
      changed = true;
    });
  });
  if (changed) saveAllStates(allStates);
}

/* ── Neu: Crypto, PIN-Validierung ─────────────────────────── */
async function hashPIN(pin, salt) {
  const data = new TextEncoder().encode(salt + ':' + pin);
  const buf  = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function isWeakPIN(pin) {
  if (/^(.)\1{5}$/.test(pin)) return true;
  const n = [...pin].map(Number);
  const diffs = n.slice(1).map((d, i) => d - n[i]);
  if (diffs.every(d => d === 1))  return true;
  if (diffs.every(d => d === -1)) return true;
  return false;
}

async function isPINTaken(pin, excludeId) {
  for (const u of USERS) {
    if (u.id === excludeId) continue;
    if (u.mustChangePIN || !u.salt) {
      if (u.pin === pin) return true;
    } else {
      if ((await hashPIN(pin, u.salt)) === u.pin) return true;
    }
  }
  return false;
}

const ADMIN_PW_KEY     = 'stempeluhr_admin_pw';
const ADMIN_PW_DEFAULT = 'Admin1234';
function getAdminPw() {
  return localStorage.getItem(ADMIN_PW_KEY) || ADMIN_PW_DEFAULT;
}
function saveAdminPw(pw) {
  localStorage.setItem(ADMIN_PW_KEY, pw);
}

/* ═══════════════════════════════════════════════════════════ */
/*  TESTS                                                      */
/* ═══════════════════════════════════════════════════════════ */
function msAgo(ms) { return new Date(Date.now() - ms).toISOString(); }
function setStateActive(userId, key, val = true) {
  const all = getAllStates();
  if (!all[userId]) { all[userId] = {}; TYPES.forEach(t => { all[userId][t.key] = false; }); }
  all[userId][key] = val;
  saveAllStates(all);
}
function pushLog(entry) {
  const log = getLog();
  log.push({ id: Date.now() + Math.random(), ...entry });
  saveLog(log);
}
function resetUsers() {
  USERS.length = 0;
  USERS.push({ id: 'test_user', name: 'Test User' });
}

(async () => {

/* ── Suite 1: getTypeStartMs ───────────────────────────────── */
suite('getTypeStartMs (Wachdienst)');

await test('gibt null zurück wenn Log leer', () => {
  resetStore();
  assertNull(getTypeStartMs('Test User', 'wachdienst'), 'leeres Log');
});

await test('gibt null zurück wenn letzter Eintrag ein stop ist', () => {
  resetStore();
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(60000) });
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'stop',  zeitstempel: msAgo(30000), dauer_ms: 30000 });
  assertNull(getTypeStartMs('Test User', 'wachdienst'), 'letzter Eintrag ist stop');
});

await test('gibt Startzeit zurück wenn letzter Eintrag ein start ist', () => {
  resetStore();
  const startTs = msAgo(10 * 60 * 1000);
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: startTs });
  const result = getTypeStartMs('Test User', 'wachdienst');
  assertNotNull(result, 'soll Startzeit liefern');
  assert(Math.abs(result - new Date(startTs).getTime()) < 10, 'Startzeit stimmt nicht überein');
});

await test('ignoriert andere Nutzer', () => {
  resetStore();
  pushLog({ nutzer: 'Anderer Nutzer', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(5000) });
  assertNull(getTypeStartMs('Test User', 'wachdienst'), 'soll anderen Nutzer ignorieren');
});

await test('ignoriert andere Typen', () => {
  resetStore();
  pushLog({ nutzer: 'Test User', typ: 'anwesenheit', aktion: 'start', zeitstempel: msAgo(5000) });
  assertNull(getTypeStartMs('Test User', 'wachdienst'), 'soll andere Typen ignorieren');
});

/* ── Suite 2: typeRemainingMs ──────────────────────────────── */
suite('typeRemainingMs (Wachdienst)');

await test('gibt null zurück wenn kein aktiver Start', () => {
  resetStore();
  assertNull(typeRemainingMs('Test User', TYPES.find(t => t.key === 'wachdienst')), 'kein Start im Log');
});

await test('gibt ~2h zurück bei gerade eingechecktem Start', () => {
  resetStore();
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(1000) });
  const rem = typeRemainingMs('Test User', TYPES.find(t => t.key === 'wachdienst'));
  assert(rem > 0, 'soll positiv sein');
  assert(rem <= TYPES.find(t => t.key === 'wachdienst').maxDurationMs, 'soll maximal 2h sein');
  assert(rem > TYPES.find(t => t.key === 'wachdienst').maxDurationMs - 5000, 'soll fast 2h sein');
});

await test('gibt 0 zurück wenn Start vor mehr als 2h', () => {
  resetStore();
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(TYPES.find(t => t.key === 'wachdienst').maxDurationMs + 60000) });
  assertEqual(typeRemainingMs('Test User', TYPES.find(t => t.key === 'wachdienst')), 0, 'nach >2h soll 0 kommen');
});

await test('gibt 0 zurück exakt bei 2h', () => {
  resetStore();
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(TYPES.find(t => t.key === 'wachdienst').maxDurationMs) });
  assertEqual(typeRemainingMs('Test User', TYPES.find(t => t.key === 'wachdienst')), 0, 'bei exakt 2h soll 0 kommen');
});

await test('gibt null zurück nach stop-Eintrag (nicht mehr aktiv)', () => {
  resetStore();
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(60 * 60 * 1000) });
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'stop',  zeitstempel: msAgo(30 * 60 * 1000), dauer_ms: 30 * 60 * 1000 });
  assertNull(typeRemainingMs('Test User', TYPES.find(t => t.key === 'wachdienst')), 'nach stop soll null kommen');
});

/* ── Suite 3: checkTimeLimits ──────────────────────────────── */
suite('checkTimeLimits (auto-stop + cooldown)');

await test('stoppt wachdienst nach >2h auch INNERHALB des Zeitfensters', () => {
  resetStore();
  saveZeitfenster('00:00', '23:59');
  assert(isWithinZeitfenster(), 'Voraussetzung: wir sind im Zeitfenster');
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(TYPES.find(t => t.key === 'wachdienst').maxDurationMs + 5 * 60 * 1000) });
  setStateActive('test_user', 'wachdienst', true);
  checkTimeLimits();
  const state = getAllStates()['test_user'];
  assertEqual(state.wachdienst, false, 'wachdienst soll nach >2h deaktiviert sein');
  const log = getLog();
  const stopEntry = log.find(e => e.nutzer === 'Test User' && e.typ === 'wachdienst' && e.aktion === 'stop' && e.auto === true);
  assert(stopEntry !== undefined, 'auto-stop Eintrag im Log fehlt');
  assertEqual(stopEntry.dauer_ms, TYPES.find(t => t.key === 'wachdienst').maxDurationMs, 'dauer_ms soll exakt 2h sein');
});

await test('stoppt NICHT wenn wachdienst weniger als 2h aktiv', () => {
  resetStore();
  saveZeitfenster('00:00', '23:59');
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(30 * 60 * 1000) });
  setStateActive('test_user', 'wachdienst', true);
  checkTimeLimits();
  const state = getAllStates()['test_user'];
  assertEqual(state.wachdienst, true, 'wachdienst soll nach nur 30min noch aktiv sein');
  const stopEntry = getLog().find(e => e.aktion === 'stop');
  assert(stopEntry === undefined, 'kein stop-Eintrag erwartet');
});

await test('stoppt NICHT wenn wachdienst bereits inaktiv (state=false)', () => {
  resetStore();
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(TYPES.find(t => t.key === 'wachdienst').maxDurationMs + 60000) });
  setStateActive('test_user', 'wachdienst', false);
  checkTimeLimits();
  const stopEntry = getLog().find(e => e.aktion === 'stop');
  assert(stopEntry === undefined, 'kein zweiter stop-Eintrag erwartet');
});

await test('stop-Zeitstempel ist startzeit + 2h (nicht jetzt)', () => {
  resetStore();
  const overMs = 10 * 60 * 1000;
  const startTs = msAgo(TYPES.find(t => t.key === 'wachdienst').maxDurationMs + overMs);
  const expectedStopMs = new Date(startTs).getTime() + TYPES.find(t => t.key === 'wachdienst').maxDurationMs;
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: startTs });
  setStateActive('test_user', 'wachdienst', true);
  checkTimeLimits();
  const stopEntry = getLog().find(e => e.aktion === 'stop' && e.auto);
  assert(stopEntry !== undefined, 'auto-stop Eintrag fehlt');
  const actualStopMs = new Date(stopEntry.zeitstempel).getTime();
  assert(Math.abs(actualStopMs - expectedStopMs) < 1000, `stop-Zeitstempel soll start+2h sein, Differenz: ${actualStopMs - expectedStopMs}ms`);
});

/* ── Suite 4: checkZeitfensterEnd ──────────────────────────── */
suite('checkZeitfensterEnd (soll wachdienst bei aktivem Zeitfenster NICHT stoppen)');

await test('tut nichts wenn wir im Zeitfenster sind', () => {
  resetStore();
  saveZeitfensterAllTypes('00:00', '23:59');
  pushLog({ nutzer: 'Test User', typ: 'wachdienst', aktion: 'start', zeitstempel: msAgo(TYPES.find(t => t.key === 'wachdienst').maxDurationMs + 60000) });
  setStateActive('test_user', 'wachdienst', true);
  checkZeitfensterEnd();

// Extrahierte Overlay-Logik (1:1 aus LifeguardClock.html)
const OVERLAY_DEVICE_FIELDS = ['adminPin', 'dayBoundaryHour', 'pinClearSeconds',
                               'autoLogoutSeconds', 'screensaverSeconds', 'zeitfensterDefaults'];
function applyCloudConfigOverlay(targetCfg, cloudData) {
  if (!cloudData || typeof cloudData !== 'object') return;
  OVERLAY_DEVICE_FIELDS.forEach(k => { if (k in cloudData) targetCfg[k] = cloudData[k]; });
  if (Array.isArray(cloudData.types) && cloudData.types.length > 0) {
    targetCfg.types = cloudData.types;
  }
}

// Extrahierte Export-Logik (1:1 aus pushConfigToCloud)
const EXPORT_DEVICE_FIELDS = ['adminPin', 'dayBoundaryHour', 'pinClearSeconds',
                              'autoLogoutSeconds', 'screensaverSeconds', 'zeitfensterDefaults', 'types'];
function buildExportableConfig(cfg) {
  const out = {};
  EXPORT_DEVICE_FIELDS.forEach(k => { if (k in cfg) out[k] = cfg[k]; });
  return out;
}

// checkDayBoundary (1:1 aus LifeguardClock.html, mit now-Parameter)
let _lastKnownDay = todayISO();
function checkDayBoundary(now = new Date()) {
  const currentDay = todayISO(now);
  if (currentDay === _lastKnownDay) return;
  _lastKnownDay = currentDay;
  const boundary   = CONFIG.dayBoundaryHour ?? 4;
  const boundaryTs = new Date(now);
  boundaryTs.setHours(boundary, 0, 0, 0);
  const stopTs    = boundaryTs.toISOString();
  const allStates = getAllStates();
  let changed     = false;
  USERS.forEach(user => {
    const state = allStates[user.id];
    if (!state) return;
    TYPES.forEach(type => {
      if (!state[type.key]) return;
      const durMs = calcDurationMs(user.name, type.logType, stopTs);
      const log   = getLog();
      log.push({ id: Date.now() + Math.random(), nutzer: user.name, typ: type.logType,
        aktion: 'stop', zeitstempel: stopTs, auto: true, dauer_ms: durMs });
      saveLog(log);
      state[type.key] = false;
      changed = true;
    });
  });
  if (changed) { saveAllStates(allStates); writeLocalBackup(); }
}

/* ══════════════════════════════════════════════════════════════
   Suite 30 – pearsonR (dashboard.html)
══════════════════════════════════════════════════════════════ */

// Kopie der Funktion aus dashboard.html
function pearsonR(xs, ys) {
  const n = xs.length;
  if (n < 2) return null;
  const mx = xs.reduce((a,b) => a+b, 0) / n;
  const my = ys.reduce((a,b) => a+b, 0) / n;
  const num = xs.reduce((s,x,i) => s + (x - mx) * (ys[i] - my), 0);
  const dx = Math.sqrt(xs.reduce((s,x) => s + (x - mx) ** 2, 0));
  const dy = Math.sqrt(ys.reduce((s,y) => s + (y - my) ** 2, 0));
  if (dx === 0 || dy === 0) return null;
  return num / (dx * dy);
}

suite('Suite 30 – pearsonR', () => {
  // perfekte positive Korrelation
  const r1 = pearsonR([1,2,3,4,5], [2,4,6,8,10]);
  assertApprox(r1, 1.0, 'Perfekte positive Korrelation → r = 1');

  // perfekte negative Korrelation
  const r2 = pearsonR([1,2,3,4,5], [10,8,6,4,2]);
  assertApprox(r2, -1.0, 'Perfekte negative Korrelation → r = -1');

  // keine Korrelation (konstante Y)
  const r3 = pearsonR([1,2,3,4,5], [5,5,5,5,5]);
  assertEqual(r3, null, 'Konstantes Y → null (keine Varianz)');

  // nur ein Datenpunkt → null
  const r4 = pearsonR([3], [7]);
  assertEqual(r4, null, 'Weniger als 2 Datenpunkte → null');

  // realistische Werte – r zwischen -1 und 1
  const r5 = pearsonR([10,20,15,30,25], [8,18,12,28,20]);
  assertEqual(r5 !== null && r5 > 0.9, true, 'Realistisch hohe Korrelation (r > 0.9)');

  // alle X gleich → null
  const r6 = pearsonR([5,5,5,5], [1,2,3,4]);
  assertEqual(r6, null, 'Konstantes X → null');

  // negative Korrelation, nicht perfekt
  const r7 = pearsonR([1,2,3,4,5], [5,3,4,2,1]);
  assertEqual(r7 !== null && r7 < 0, true, 'Negative (unreine) Korrelation → r < 0');

  // genau 2 Datenpunkte, identische X → null
  const r8 = pearsonR([2,2], [3,7]);
  assertEqual(r8, null, '2 gleiche X-Werte → null');
});

const out = document.getElementById('output');
let suiteNow = '', passCount = 0, failCount = 0;

results.forEach(r => {
  if (r.suite !== suiteNow) {
    suiteNow = r.suite;
    const h = document.createElement('div');
    h.className = 'suite-title';
    h.textContent = r.suite;
    out.appendChild(h);
  }
  const d = document.createElement('div');
  d.className = 'result ' + (r.ok ? 'pass' : 'fail');
  d.textContent = (r.ok ? '✓ ' : '✗ ') + r.name + (r.ok ? '' : '\n  → ' + r.err);
  d.style.whiteSpace = 'pre-wrap';
  out.appendChild(d);
  if (r.ok) passCount++; else failCount++;
});

const sum = document.getElementById('summary');
sum.className = failCount === 0 ? 'all-pass' : 'has-fail';
sum.textContent = failCount === 0
  ? `✓ Alle ${passCount} Tests bestanden`
  : `✗ ${failCount} von ${passCount + failCount} Tests fehlgeschlagen`;

})(); // async IIFE
