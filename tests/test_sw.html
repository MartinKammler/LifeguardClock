<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>sw.js – Unit Tests</title>
  <style>
    body { font-family: monospace; background: #0d0d12; color: #ccc; margin: 0; padding: 20px; }
    h1   { color: #fff; font-size: 1.1rem; margin-bottom: 16px; }
    .suite { margin-bottom: 20px; }
    .suite-title { color: #7eb8f7; font-size: .9rem; margin-bottom: 6px; font-weight: bold; }
    .pass { color: #4caf7d; }
    .fail { color: #f76e6e; }
    .result { font-size: .82rem; margin: 2px 0 2px 12px; }
    #summary { margin-top: 24px; font-size: 1rem; font-weight: bold; padding: 10px; border-radius: 6px; }
    .all-pass { background: #1a3a28; color: #4caf7d; }
    .has-fail { background: #3a1a1a; color: #f76e6e; }
  </style>
</head>
<body>
<h1>sw.js – Unit Tests</h1>
<div id="output"></div>
<div id="summary"></div>

<script>
/* ── Mini Test-Runner ─────────────────────────────────────────── */
const results = [];
let currentSuite = '';
function suite(name) { currentSuite = name; }
async function test(name, fn) {
  try { await fn(); results.push({ suite: currentSuite, name, ok: true }); }
  catch (e) { results.push({ suite: currentSuite, name, ok: false, err: e.message }); }
}
function assert(cond, msg) { if (!cond) throw new Error(msg || 'Assertion failed'); }
function assertEqual(a, b, msg) {
  if (a !== b) throw new Error(msg || `Expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════════════
   SW-Logik extrahiert (ohne Service Worker Globals)
   ══════════════════════════════════════════════════════════════ */

const CACHE_NAME = 'lgc-shell-v3';
const APP_SHELL = [
  './LifeguardClock.html',
  './manifest.json',
  './Logo.png',
];

// Routing-Logik aus dem fetch-Handler extrahiert:
function classifyRequest(url) {
  if (!url.startsWith('http')) return 'ignore';
  const u = new URL(url);
  if (u.pathname.endsWith('config.js') || u.pathname.includes('/remote.php/')) return 'network-first';
  if (APP_SHELL.some(path => u.pathname.endsWith(path.replace('./', '/')))) return 'cache-first';
  return 'network-first';
}

/* ═══════════════════════════════════════════════════════════════ */
/*  TESTS                                                          */
/* ═══════════════════════════════════════════════════════════════ */
(async () => {

/* ── Suite 1: Konfiguration ───────────────────────────────────── */
suite('SW Konfiguration');

await test('CACHE_NAME ist gesetzt', () => {
  assert(CACHE_NAME && CACHE_NAME.length > 0, 'CACHE_NAME soll nicht leer sein');
  assert(CACHE_NAME.startsWith('lgc-'), 'CACHE_NAME soll mit lgc- beginnen');
});

await test('APP_SHELL enthält LifeguardClock.html', () => {
  assert(APP_SHELL.some(p => p.includes('LifeguardClock.html')),
    'APP_SHELL soll LifeguardClock.html enthalten');
});

await test('APP_SHELL enthält manifest.json', () => {
  assert(APP_SHELL.some(p => p.includes('manifest.json')),
    'APP_SHELL soll manifest.json enthalten');
});

await test('APP_SHELL enthält Logo.png', () => {
  assert(APP_SHELL.some(p => p.includes('Logo.png')),
    'APP_SHELL soll Logo.png enthalten');
});

/* ── Suite 2: Request-Klassifizierung ─────────────────────────── */
suite('Request-Klassifizierung (Routing)');

await test('chrome-extension:// URLs werden ignoriert', () => {
  assertEqual(classifyRequest('chrome-extension://abc/page.html'), 'ignore');
});

await test('data: URLs werden ignoriert', () => {
  assertEqual(classifyRequest('data:text/html,hello'), 'ignore');
});

await test('blob: URLs werden ignoriert', () => {
  assertEqual(classifyRequest('blob:http://localhost/abc'), 'ignore');
});

await test('config.js → network-first', () => {
  assertEqual(classifyRequest('https://example.com/config.js'), 'network-first');
  assertEqual(classifyRequest('https://example.com/path/config.js'), 'network-first');
});

await test('WebDAV remote.php → network-first', () => {
  assertEqual(classifyRequest('https://cloud.example.com/remote.php/dav/files/user/'), 'network-first');
});

await test('LifeguardClock.html → cache-first', () => {
  assertEqual(classifyRequest('https://example.com/LifeguardClock.html'), 'cache-first');
});

await test('manifest.json → cache-first', () => {
  assertEqual(classifyRequest('https://example.com/manifest.json'), 'cache-first');
});

await test('Logo.png → cache-first', () => {
  assertEqual(classifyRequest('https://example.com/Logo.png'), 'cache-first');
});

await test('unbekannte Ressource → network-first (default)', () => {
  assertEqual(classifyRequest('https://example.com/dashboard.html'), 'network-first');
  assertEqual(classifyRequest('https://example.com/other.js'), 'network-first');
});

await test('admin.html → network-first (nicht in APP_SHELL)', () => {
  assertEqual(classifyRequest('https://example.com/admin.html'), 'network-first');
});

/* ── Suite 3: APP_SHELL Pfad-Matching ─────────────────────────── */
suite('APP_SHELL Pfad-Matching');

await test('Pfad-Matching funktioniert mit und ohne Subdirectory', () => {
  // Simuliert GitHub Pages: /LifeguardClock/LifeguardClock.html
  assertEqual(classifyRequest('https://user.github.io/LifeguardClock/LifeguardClock.html'), 'cache-first');
  assertEqual(classifyRequest('https://user.github.io/LifeguardClock/Logo.png'), 'cache-first');
});

await test('Ähnliche Dateinamen matchen nicht falsch', () => {
  // NotLifeguardClock.html sollte nicht matchen — aber endsWith matched es trotzdem
  // Das ist ein bekanntes Limit des einfachen Matching-Algorithmus
  const result = classifyRequest('https://example.com/NotLifeguardClock.html');
  // Dokumentiert: endsWith-basiertes Matching hat keine strikte Pfadgrenze
  assert(result === 'cache-first' || result === 'network-first',
    'Soll einen gültigen Routing-Typ zurückgeben');
});

/* ── Suite 4: Edge Cases ──────────────────────────────────────── */
suite('Edge Cases');

await test('config.js in Subdirectory → network-first', () => {
  assertEqual(classifyRequest('https://example.com/sub/config.js'), 'network-first');
});

await test('Query-Parameter beeinflussen Routing nicht falsch', () => {
  assertEqual(classifyRequest('https://example.com/LifeguardClock.html?v=2'), 'cache-first');
});

await test('Fragment beeinflussen Routing nicht', () => {
  assertEqual(classifyRequest('https://example.com/LifeguardClock.html#section'), 'cache-first');
});

/* ── Render ───────────────────────────────────────────────────── */
const out = document.getElementById('output');
const sum = document.getElementById('summary');
let lastSuite = '';
let passed = 0, failed = 0;

results.forEach(r => {
  if (r.suite !== lastSuite) {
    lastSuite = r.suite;
    const d = document.createElement('div');
    d.className = 'suite';
    d.innerHTML = `<div class="suite-title">${escHtml(r.suite)}</div>`;
    out.appendChild(d);
  }
  const d = document.createElement('div');
  d.className = `result ${r.ok ? 'pass' : 'fail'}`;
  d.textContent = `${r.ok ? '✓' : '✗'} ${r.name}${r.err ? ' — ' + r.err : ''}`;
  out.lastChild.appendChild(d);
  r.ok ? passed++ : failed++;
});

sum.className = failed === 0 ? 'all-pass' : 'has-fail';
sum.textContent = `${passed} passed, ${failed} failed — ${passed + failed} total`;

})();
</script>
</body>
</html>
